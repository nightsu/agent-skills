interface:
  display_name: "Kabu Story"
  short_description: "为 3 到 4 岁儿童生成睡前、日常、关系、探索与成长故事"
  default_prompt: "Use $kabu-story to write a safe, low-burden story for a young child. First infer the story type from the prompt, default to bedtime when unclear, keep one emotional core and one simple narrative line, then end with warmth, discovery, repair, or a small next step as appropriate."
