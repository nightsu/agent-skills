name: figma-assets-validate
description: 读取 docs/design/<feature>/ 下已有产物和 Figma evidence,生成 assets-manifest.md、validation-report.md 与 snapshots/,收口资源交付、visual baseline 和自动化验证。
default_prompt: "使用 $figma-assets-validate feature=<feature-name> 读取 docs/design/<feature>/ 下已有产物和 .figma-cache evidence,输出 docs/design/<feature>/assets-manifest.md、validation-report.md 与 snapshots/,并在 inputs.md 追加一条记录。可下载 required visual baseline snapshot,但默认不下载所有生产资源;不要把 LLM-as-judge 当作唯一验收,不要写业务代码。"
